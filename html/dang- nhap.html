<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Thành Viên - Vogue X</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo"><a href="index.html"><h1>VOGUE<span>.X</span></h1></a></div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Trang Chủ</a></li>
                    <li><a href="tin-tuc.html">Tin Tức & Sự Kiện</a></li>
                    <li><a href="xu-huong.html">Xu Hướng</a></li>
                    <li><a href="lam-dep.html">Làm Đẹp</a></li>
                    <li><a href="dang-nhap.html" class="active login-nav-btn">Đăng Nhập</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="login-page-container">
            <h2 style="font-family:'Orbitron'; text-align:center; margin-bottom:30px; background:linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">VOGUE MEMBER</h2>
            <form id="pageLoginForm">
                <div class="form-group">
                    <label>Tài khoản Email</label>
                    <input type="email" placeholder="example@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-glow" style="width: 100%; padding: 12px;">Đăng Nhập Ngay</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
